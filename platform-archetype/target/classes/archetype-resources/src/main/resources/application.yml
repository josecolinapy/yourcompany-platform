spring:
  application:
    name: ${serviceName}
  datasource:
    url: jdbc:postgresql://localhost:5432/${artifactId}
    username: ${artifactId}
    password: ${artifactId}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

platform:
  web:
    enabled: true
  jpa:
    enabled: true
    show-sql: false
    default-schema: public
    jdbc-time-zone: UTC
  observability:
    enabled: true
    correlation-id-header: X-Correlation-Id
    include-mdc: true
  openapi:
    enabled: true
    title: ${applicationName} API
    version: ${version}
    description: Generated service from platform archetype
